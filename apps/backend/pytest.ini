[pytest]
testpaths = tests
python_files = test_*.py
python_classes = *Tests
python_functions = test_*
addopts = -v --tb=short
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests (requiring DB or external services)
    ai: marks tests involving AI/LLM providers
    db: marks tests requiring a database connection
