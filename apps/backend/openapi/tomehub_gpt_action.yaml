openapi: 3.0.3
info:
  title: TomeHub Search Action
  version: 1.0.0
  description: Read-only TomeHub retrieval for a custom GPT.
servers:
  - url: https://api.tomehub.nl
paths:
  /ext/v1/health:
    get:
      operationId: getTomeHubHealth
      summary: Check TomeHub action health
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Health response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /ext/v1/search:
    post:
      operationId: searchTomeHub
      summary: Search TomeHub knowledge
      description: Search TomeHub and return read-only evidence snippets.
      security:
        - bearerAuth: []
      x-openai-isConsequential: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SearchRequest"
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResponse"
        "401":
          description: Invalid or missing API key
        "403":
          description: Missing required scope
        "404":
          description: External API disabled
        "500":
          description: Server error
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: APIKey
  schemas:
    HealthResponse:
      type: object
      properties:
        service:
          type: string
        enabled:
          type: boolean
        version:
          type: string
    SearchRequest:
      type: object
      required:
        - query
      properties:
        query:
          type: string
          description: Natural language search query.
        book_id:
          type: string
          nullable: true
        resource_type:
          type: string
          nullable: true
        mode:
          type: string
          enum:
            - STANDARD
            - EXPLORER
          default: STANDARD
        include_private_notes:
          type: boolean
          default: false
        content_type:
          type: string
          nullable: true
        ingestion_type:
          type: string
          nullable: true
        limit:
          type: integer
          minimum: 1
          maximum: 12
          default: 8
        offset:
          type: integer
          minimum: 0
          maximum: 10000
          default: 0
    SearchResult:
      type: object
      properties:
        chunk_id:
          type: integer
          nullable: true
        item_id:
          type: string
          nullable: true
        title:
          type: string
        snippet:
          type: string
        page_number:
          type: number
          nullable: true
        source_type:
          type: string
          nullable: true
        score:
          type: number
        tags:
          type: array
          items:
            type: string
        summary:
          type: string
          nullable: true
        comment:
          type: string
          nullable: true
    SearchMetadata:
      type: object
      properties:
        query:
          type: string
        mode:
          type: string
        intent:
          type: string
          nullable: true
        confidence:
          type: number
          nullable: true
        result_count:
          type: integer
        visibility_scope:
          type: string
        search_log_id:
          type: integer
          nullable: true
        retrieval_path:
          type: string
          nullable: true
    SearchResponse:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/SearchResult"
        timestamp:
          type: string
          format: date-time
        metadata:
          $ref: "#/components/schemas/SearchMetadata"
